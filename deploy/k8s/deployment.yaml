apiVersion: apps/v1
kind: Deployment
metadata:
  name: prism
  labels:
    app.kubernetes.io/name: prism
    app.kubernetes.io/part-of: llm-d-benchmark
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prism
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prism
    spec:
      # OpenShift's restricted-v2 SCC assigns a random UID/fsGroup; do NOT pin runAsUser.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prism
          # TODO: replace with the published prism image (registry + tag).
          image: PRISM_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # app writes nothing, but node/express may touch /tmp
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # Prism serves /api/local/* from /app/private/benchmarks (hardcoded in
            # server/server.js). Mount the benchmark results PVC there, read-only.
            - name: results
              mountPath: /app/private/benchmarks
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/config
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/config
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: results
          persistentVolumeClaim:
            # This PVC is created by llm-d-benchmark in the harness namespace.
            # It is ReadWriteMany, so prism can mount it read-only while the
            # harness / data-access pods keep writing to it.
            claimName: workload-pvc
            readOnly: true
