apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Set the target namespace at apply time, e.g.:
#   kustomize build deploy/k8s | oc apply -n <harness-namespace> -f -
# or uncomment and pin it here:
# namespace: my-harness-ns

resources:
  - deployment.yaml
  - service.yaml
  # Pick ONE of the following for external access:
  - route.yaml       # OpenShift
  # - ingress.yaml   # vanilla Kubernetes

images:
  - name: PRISM_IMAGE
    newName: ghcr.io/llm-d/llm-d-prism   # TODO: confirm registry
    newTag: latest
