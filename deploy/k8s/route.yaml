# OpenShift Route (OCP). For vanilla Kubernetes, use ingress.yaml instead.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: prism
  labels:
    app.kubernetes.io/name: prism
    app.kubernetes.io/part-of: llm-d-benchmark
spec:
  to:
    kind: Service
    name: prism
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
