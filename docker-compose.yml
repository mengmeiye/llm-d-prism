version: '3.8'

services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - ~/.config/gcloud/application_default_credentials.json:/tmp/adc.json
    environment:
      - GOOGLE_APPLICATION_DEFAULT_CREDENTIALS=/tmp/adc.json
      - PORT=3000
      - DEFAULT_BUCKETS=llm-d-benchmarks
    ports:
      - "8081:5173"
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
